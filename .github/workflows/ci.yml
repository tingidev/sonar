name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction -E snowflake
      - name: Run unit tests
        run: poetry run pytest -m "not integration" --tb=short -q

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sonar_test
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U sonar -d sonar_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction -E snowflake
      - name: Seed test database
        run: PGPASSWORD=sonar psql -h localhost -p 5433 -U sonar -d sonar_test -f tests/fixtures/init.sql
      - name: Run integration tests
        run: poetry run pytest -m integration --tb=short -q

  coverage:
    runs-on: ubuntu-latest
    needs: [test, integration]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sonar_test
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U sonar -d sonar_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction -E snowflake
      - name: Seed test database
        run: PGPASSWORD=sonar psql -h localhost -p 5433 -U sonar -d sonar_test -f tests/fixtures/init.sql
      - name: Run all tests with coverage
        run: poetry run pytest --cov-fail-under=80 --tb=short -q
